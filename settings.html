<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiftcart - Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        /* CSS CONSOLIDATED FOR MAXIMUM RELIABILITY */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #fcf8f5;
            --text: #100a05;
            --primary: #c58252;
            --secondary: #8ed9b0;
            --accent: #67becc;
            --accent-readable: #2a6f7a;
            --muted: #6e5a49;
            --card: #fffdfb;
            --gray-bar: #e9dfd7;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at top left, #fff7f0 0%, var(--bg) 45%);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header Styling */
        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .navbar {
            background: var(--gray-bar);
            border-radius: 999px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.1);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--accent-readable);
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(103, 190, 204, 0.2);
            color: #15545e;
        }

        .brand-logo {
            width: 100px;
            height: auto;
        }

        .account-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.16);
        }

        /* Main Content */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-title {
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .page-title p {
            color: var(--muted);
        }

        /* Settings Specific Layout */
        .settings-layout {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .settings-card {
            background: var(--card);
            border: 1px solid #eadfd6;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }

        .settings-card h2 {
            font-size: 1.3rem;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .settings-card label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-weight: 500;
            color: var(--muted);
        }

        /* Custom Checkbox Style */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        /* Footer Styling */
        .site-footer {
            margin-top: 60px;
            padding: 0 24px 40px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer-shell {
            background: linear-gradient(135deg, #f6ece4, #f1faf6);
            border: 1px solid #eadfd6;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
