<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftcart - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #fcf8f5; --text: #100a05; --primary: #c58252; --secondary: #8ed9b0; --accent: #67becc; --accent-readable: #2a6f7a; --muted: #6e5a49; --card: #fffdfb; --gray-bar: #e9dfd7; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top left, #fff7f0 0%, var(--bg) 45%); color: var(--text); line-height: 1.6; }
        .site-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; max-width: 1400px; margin: 0 auto; }
        .brand-logo { width: 100px; height: auto; }
        .navbar { background: var(--gray-bar); border-radius: 999px; padding: 10px 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--accent-readable); font-weight: 600; padding: 8px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-links a:hover { background: rgba(103, 190, 204, 0.2); }
        .account-logo { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; }
        main { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .carousel-section h1 { margin-bottom: 20px; font-size: 1.8rem; }
        .carousel { position: relative; border-radius: 24px; overflow: hidden; background: linear-gradient(135deg, #f6ece4, #f2f8fa); padding: 20px; }
        .carousel-track { display: flex; gap: 16px; transition: transform 0.5s ease; }
        .arrival-card { min-width: calc(33.333% - 11px); min-height: 250px; border-radius: 20px; padding: 25px; color: white; display: flex; flex-direction: column; justify-content: flex-end; background-size: cover; background-position: center; position: relative; z-index: 1; }
        .arrival-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); border-radius: 20px; z-index: -1; }
        /* Backgrounds - Ensure filenames match exactly */
        .tone-one { background-image: url("./photos/Avo slide.png"); }
        .tone-two { background-image: url("./photos/Ribeye Cuts slide.png"); }
        .tone-three { background-image: url("./photos/fruit slide.png"); }
        .tone-four { background-image: url("./photos/Bread slide.png"); }
        .tone-five { background-image: url("./photos/Yogurt slide.png"); }
        .categories { margin-top: 40px; }
        .category-row { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .category-circle { width: 110px; height: 110px; border-radius: 50%; background: var(--secondary); display: flex; align-items: center; justify-content: center; font-weight: 700; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .carousel-arrow-prev { left: 10px; } .carousel-arrow-next { right: 10px; }
        @media (max-width: 820px) { .arrival-card { min-width: 100%; } .site-header { flex-direction: column; gap: 15px; } .navbar { width: 100%; text-align: center; } }
    </style>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="#"><img src="./photos/Logo.png" alt="Logo" class="brand-logo"></a>
        <nav class="navbar"><ul class="nav-links">
            <li><a href="./shop.html">Shop</a></li>
            <li><a href="./schedule.html">My Schedule</a></li>
            <li><a href="./settings.html">Settings</a></li>
        </ul></nav>
        <a class="account-logo" href="#">👤</a>
    </header>
    <main>
        <section class="carousel-section">
            <h1>New Food Arrivals</h1>
            <div class="carousel">
                <button class="carousel-arrow carousel-arrow-prev" id="prevBtn">&#10094;</button>
                <div class="carousel-track" id="track">
                    <article class="arrival-card tone-one"><h3>Organic Avocado Bundle</h3></article>
                    <article class="arrival-card tone-two"><h3>Premium Ribeye Cuts</h3></article>
                    <article class="arrival-card tone-three"><h3>Seasonal Fruit Mix</h3></article>
                    <article class="arrival-card tone-four"><h3>Warm Sourdough</h3></article>
                </div>
                <button class="carousel-arrow carousel-arrow-next" id="nextBtn">&#10095;</button>
            </div>
        </section>
        <section class="categories">
            <h2>Categories</h2>
            <div class="category-row">
                <div class="category-circle">Meats</div>
                <div class="category-circle">Fruits</div>
                <div class="category-circle">Vegetables</div>
                <div class="category-circle">Dairy</div>
            </div>
        </section>
    </main>
    <script>
        const track = document.getElementById('track');
        let index = 0;
        document.getElementById('nextBtn').addEventListener('click', () => {
            const width = track.firstElementChild.getBoundingClientRect().width + 16;
            index = (index + 1) % (track.children.length - 2);
            track.style.transform = `translateX(-${index * width}px)`;
        });
        document.getElementById('prevBtn').addEventListener('click', () => {
            const width = track.firstElementChild.getBoundingClientRect().width + 16;
            index = index > 0 ? index - 1 : 0;
            track.style.transform = `translateX(-${index * width}px)`;
        });
    </script>
</body>
</html>
